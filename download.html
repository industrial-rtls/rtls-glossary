<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Downloading – Industrial RTLS Glossary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0A0F1E;--surface:#111827;--border:#1E3A5F;--text:#F0F4FF;--muted:#8B9CB8;--accent:#2563EB;--accent-hi:#3B82F6}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
  header{position:fixed;top:0;left:0;right:0;border-bottom:1px solid var(--border);padding:0 2rem;background:rgba(10,15,30,0.96);display:flex;align-items:center;height:60px}
  .logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1rem;letter-spacing:.05em;color:var(--text);text-decoration:none}
  .logo span{color:var(--accent-hi)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:3rem 2.5rem;max-width:480px;width:100%}
  .icon{font-size:3rem;margin-bottom:1.5rem}
  h1{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700;margin-bottom:.75rem}
  p{color:var(--muted);font-size:.95rem;margin-bottom:1.5rem;line-height:1.6}
  .btn{display:inline-block;background:var(--accent);color:#fff;padding:.7rem 1.5rem;border-radius:4px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:.9rem;text-decoration:none;transition:background .15s;margin-bottom:1rem}
  .btn:hover{background:var(--accent-hi)}
  .back{display:block;color:var(--muted);font-size:.85rem;text-decoration:none;margin-top:.5rem}
  .back:hover{color:var(--accent-hi)}
  .progress{width:100%;height:3px;background:var(--border);border-radius:2px;margin-bottom:1.5rem;overflow:hidden}
  .progress-bar{height:100%;background:var(--accent);border-radius:2px;animation:fill 2s ease forwards}
  @keyframes fill{from{width:0}to{width:100%}}
</style>
</head>
<body>
<header>
  <a href="index.html" class="logo">RTLS <span>Glossary</span></a>
</header>
<div class="card">
  <div class="icon">📄</div>
  <h1>Your download is starting…</h1>
  <div class="progress"><div class="progress-bar"></div></div>
  <p>The Industrial RTLS Glossary PDF (252 terms, 112 abbreviations) should download automatically. If it doesn't, click the button below.</p>
  <a href="Industrial-RTLS-Glossary.pdf" download class="btn">Download PDF manually</a>
  <a href="index.html" class="back">← Back to the glossary</a>
</div>
<script>
  // Auto-trigger download after short delay
  setTimeout(function() {
    var a = document.createElement('a');
    a.href = 'Industrial-RTLS-Glossary.pdf';
    a.download = 'Industrial-RTLS-Glossary.pdf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }, 800);
</script>
</body>
</html>
